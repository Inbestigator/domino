<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topplebit Viewer</title>
    <script type="module" src="/client.js"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="drop-zone" class="card">
      <input type="file" id="file-input" accept=".tbit" style="display: none" />
      <strong>
        <span class="mobile-only">Click to open</span>
        <span class="not-mobile">Drop a <code>.tbit</code> file here to view</span> a
        project</strong
      >
    </div>
    <div id="project" class="card need-child"></div>
    <strong id="error" class="card need-child"></strong>
  </body>
</html>
